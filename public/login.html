<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QR Message Wall — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 420px;
      backdrop-filter: blur(12px);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo p {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 6px;
      font-weight: 500;
    }

    input, select {
      width: 100%;
      padding: 11px 14px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: #fff;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      border-color: rgba(102, 126, 234, 0.6);
    }

    select option { background: #1a1a2e; }

    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn:hover   { opacity: 0.9; }
    .btn:active  { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error {
      background: rgba(220, 60, 60, 0.15);
      border: 1px solid rgba(220, 60, 60, 0.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: #ff6b6b;
      margin-top: 14px;
      display: none;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <h1>QR Message Wall</h1>
    <p>Sign in to manage your events</p>
  </div>

  <div class="field">
    <label for="username">Username</label>
    <input id="username" type="text" placeholder="Enter username" autocomplete="username"/>
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" autocomplete="current-password"/>
  </div>

  <div class="field">
    <label for="region">Region</label>
    <select id="region">
      <option value="us">🇺🇸 United States</option>
      <option value="asia">🌏 Asia / India</option>
    </select>
  </div>

  <button class="btn" id="login-btn">Sign in</button>
  <div class="error" id="error-msg"></div>
</div>

<script>
  const btn      = document.getElementById('login-btn');
  const errorMsg = document.getElementById('error-msg');

  async function login() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const region   = document.getElementById('region').value;

    if (!username || !password) {
      showError('Please enter your username and password.');
      return;
    }

    btn.disabled    = true;
    btn.textContent = 'Signing in…';
    errorMsg.style.display = 'none';

    try {
      const res  = await fetch('/auth/login', {
        method:      'POST',
        headers:     { 'Content-Type': 'application/json' },
        credentials: 'include',
        body:        JSON.stringify({ username, password, region }),
      });

      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Login failed');
        return;
      }

      // Redirect based on role
      const role = data.user.role;
      if (role === 'admin' || role === 'moderator') {
        window.location.href = '/admin/dashboard';
      } else {
        window.location.href = '/';
      }
    } catch {
      showError('Network error — please try again.');
    } finally {
      btn.disabled    = false;
      btn.textContent = 'Sign in';
    }
  }

  function showError(msg) {
    errorMsg.textContent   = msg;
    errorMsg.style.display = 'block';
  }

  btn.addEventListener('click', login);

  // Allow Enter key to submit
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
